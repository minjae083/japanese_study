<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JLPT Master</title>
<style>
body { font-family: sans-serif; text-align:center; background:#f5f5f7; }
.screen { display:none; padding:20px; }
.active { display:block; }
.card {
    background:white;
    border-radius:20px;
    padding:30px;
    margin:20px auto;
    width:300px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
button { padding:10px 20px; margin:10px; }
</style>
</head>

<body>

<!-- 스키밍 -->
<div id="skimming" class="screen active">
    <h2 id="counter"></h2>
    <div id="card" class="card"></div>
    <button onclick="handleAction('left')">알고있어요</button>
    <button onclick="handleAction('right')">학습할게요</button>
</div>

<!-- 플래시카드 -->
<div id="flash" class="screen">
    <div id="flash-zone"></div>
</div>

<!-- 결과 -->
<div id="result" class="screen"></div>

<script>

// ===== 상태 =====
let state = {
    db: [],
    skimmingQueue: [],
    flashQueue: [],
    skimIdx: 0,
    flashIdx: 0,
    flashStartTime: 0,
    results: { easy:[], hard:[], unknown:[] }
};

// ===== 데이터 로드 =====
async function init(){
    const res = await fetch('jlpt_n3_expanded.json');
    state.db = await res.json();

    // 테스트용 6개
    state.skimmingQueue = state.db.slice(0,6);

    renderSkim();
}
init();

// ===== 스키밍 카드 =====
function renderSkim(){
    const word = state.skimmingQueue[state.skimIdx];

    document.getElementById('counter').innerText =
        `${state.skimIdx+1} / ${state.skimmingQueue.length}`;

    document.getElementById('card').innerHTML = `
        <h1>${word.kanji}</h1>
        <p>${word.furigana}</p>
        <p>${word.meaning}</p>
        <p>${word.example_jp}</p>
        <p>${word.example_kr}</p>
        <button onclick="speak('${word.kanji}')">🔊</button>
    `;
}

// ===== 스키밍 처리 =====
function handleAction(dir){
    const word = state.skimmingQueue[state.skimIdx];

    // ✔ 명세서 기준 수정
    if(dir === 'left'){
        // 알고 있음 → 플래시카드
        state.flashQueue.push(word);
    }else{
        // 학습 필요 → 나중에 복습용
        state.flashQueue.push(word);
    }

    state.skimIdx++;

    if(state.skimIdx >= state.skimmingQueue.length){
        startFlash();
    }else{
        renderSkim();
    }
}

// ===== 플래시 시작 =====
function startFlash(){
    show('flash');
    state.flashIdx = 0;
    state.flashStartTime = Date.now();
    renderFlash();
}

// ===== 플래시 앞면 =====
function renderFlash(){
    const word = state.flashQueue[state.flashIdx];

    document.getElementById('flash-zone').innerHTML = `
        <div class="card">
            <h1>${word.kanji}</h1>
            <button onclick="speak('${word.kanji}')">🔊</button>
            <br><br>
            <button onclick="flip()">뒷면보기</button>
        </div>
    `;
}

// ===== 뒤집기 =====
function flip(){
    const word = state.flashQueue[state.flashIdx];

    document.getElementById('flash-zone').innerHTML = `
        <div class="card">
            <h1>${word.kanji}</h1>
            <p>${word.meaning}</p>
            <p>${word.example_jp}</p>
            <p>${word.example_kr}</p>

            <button onclick="rate('unknown')">몰랐어요</button>
            <button onclick="rate('hard')">헷갈렸어요</button>
            <button onclick="rate('easy')">쉬웠어요</button>
        </div>
    `;
}

// ===== 평가 =====
function rate(type){
    const word = state.flashQueue[state.flashIdx];

    state.results[type].push(word);

    state.flashIdx++;

    if(state.flashIdx >= state.flashQueue.length){
        showResult();
    }else{
        renderFlash();
    }
}

// ===== 결과 =====
function showResult(){
    show('result');

    const total = state.flashQueue.length;
    const easy = state.results.easy.length;
    const acc = Math.round((easy/total)*100);

    const time = Math.floor((Date.now()-state.flashStartTime)/1000);

    document.getElementById('result').innerHTML = `
        <h2>학습 완료</h2>
        <p>암기율: ${acc}%</p>
        <p>총 시간: ${time}초</p>
        <p>단어당 시간: ${(time/total).toFixed(1)}초</p>
    `;
}

// ===== 화면 전환 =====
function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ===== TTS =====
function speak(t){
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'ja-JP';
    speechSynthesis.speak(u);
}

</script>

</body>
</html>
