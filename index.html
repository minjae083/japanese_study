<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Swipe Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+KR:wght@500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B; --accent: #4ECDC4; --bg: #F5F5F7; --card-bg: #FFFFFF;
            --text-main: #1D1D1F; --text-sub: #86868B; --border: rgba(0,0,0,0.08);
            --shadow: 0 15px 35px rgba(0,0,0,0.1); --radius: 25px; --nav-h: 84px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);overflow:hidden; height: 100vh;}
        button{cursor:pointer;border:none;outline:none;font-family:inherit;}
        ruby rt { font-size: 0.55em; color: var(--primary); font-family: 'Noto Sans JP'; line-height: 1.1; }
        .hidden{display:none !important;}
        #app{width:100%;max-width:430px;height:100vh;margin:0 auto;position:relative;overflow:hidden;}

        /* --- SCREENS --- */
        .screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s; z-index: 10; background: var(--bg);}
        .screen.active{opacity:1; pointer-events: all;}

        /* [증명: 홈 화면 사진 반영] 캘린더 & 상단 위젯 */
        .cal-container { background: var(--card-bg); border-radius: var(--radius); padding: 15px; margin: 0 20px 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 50%; }
        .cal-day.today { background: var(--primary); color: white; font-weight: 900; }
        .cal-day.done { background: var(--accent); color: white; }
        .dday-chip { background: var(--primary); color: white; padding: 6px 14px; border-radius: 20px; font-family: 'DM Mono'; font-weight: 700; font-size: 14px; }

        /* [증명: 흐름도 3-2] 홈 메뉴 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; }
        .menu-card { background: var(--card-bg); border-radius: 18px; padding: 20px 10px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .menu-label { font-weight: 800; font-size: 14px; margin-top: 5px; }

        /* --- WORD CARD --- */
        .swipe-zone { flex: 1; position: relative; perspective: 1000px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .word-card { position: absolute; width: 92%; height: 82%; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .swipe-overlay { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; backdrop-filter: blur(15px); transition: 0.2s; }
        .word-card.sw-left .swipe-overlay.left { opacity: 1; background: rgba(78, 205, 196, 0.2); color: #00796b; }
        .word-card.sw-right .swipe-overlay.right { opacity: 1; background: rgba(255, 107, 107, 0.2); color: #c62828; }

        /* [증명: 수정본 2] 플래시카드 디자인 (화이트) */
        .fc-front { background: #FFFFFF !important; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .fc-kanji { font-size: 72px; font-weight: 900; font-family: 'Noto Sans JP'; color: #000; margin-bottom: 20px; }

        /* [증명: 고칠점 3 & 사진 반영] 라이브러리 UI */
        .lib-item { background: white; border-radius: 18px; padding: 15px 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .lib-num { font-family: 'DM Mono'; font-size: 12px; color: var(--text-sub); width: 25px; }
        .lib-main { flex: 1; }
        .lib-furi { font-size: 11px; color: var(--accent); }
        .lib-kanji { font-size: 18px; font-weight: 800; font-family: 'Noto Sans JP'; }
        .lib-mean { font-size: 13px; color: var(--text-sub); }

        /* [증명: 고칠점 4] 하단 배너 순서 (스키밍 맨 오른쪽) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; height: var(--nav-h); background: rgba(255,255,255,0.98); display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .btn-skim { flex: 1; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 14px; }
        .btn-skim.hard { background: rgba(255, 107, 107, 0.1); color: var(--primary); border: 1.5px solid var(--primary); }
        .btn-skim.mid { background: rgba(134, 134, 139, 0.1); color: var(--text-sub); border: 1.5px solid var(--text-sub); }
        .btn-skim.easy { background: rgba(78, 205, 196, 0.1); color: var(--accent); border: 1.5px solid var(--accent); }
    </style>
</head>
<body>
<div id="app">
    <div id="screen-onboarding" class="screen active" style="align-items:center; justify-content:center; padding:40px;">
        <h2 style="text-align:center; margin-bottom:30px;">마음에 드는<br>카드 스타일을 고르세요</h2>
        <div style="display:flex; gap:15px; width:100%; margin-bottom:40px;">
            <div class="menu-card" style="flex:1;" onclick="setTheme('anime', this)">🎌<br><div class="menu-label">애니메이션</div></div>
            <div class="menu-card" style="flex:1;" onclick="setTheme('realism', this)">📷<br><div class="menu-label">리얼리즘</div></div>
        </div>
        <button id="btn-theme-confirm" class="btn-skim hard" style="width:100%;" disabled onclick="showIntro()">이 스타일로 하기</button>
    </div>

    <div id="screen-intro" class="screen hidden" style="align-items:center; justify-content:center; padding:30px;">
        <h2 style="text-align:center;">지금 바로,<br>첫 번째 단어들을 펼쳐봅시다 🚀</h2>
        <button class="btn-skim hard" style="margin-top:40px; width:100%;" onclick="startSkimming(true)">스키밍 시작하기</button>
    </div>

    <div id="screen-skimming" class="screen hidden">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div id="skim-lvl-badge" style="font-weight: 900; color: var(--primary);">N3</div>
            <div id="skim-counter" style="font-family: 'DM Mono'; font-weight: 700; color: var(--text-sub);">1 / 6</div>
            <div style="width: 20px;"></div>
        </div>
        <div class="swipe-zone" id="skim-zone"></div>
        <div style="display: flex; gap: 12px; padding: 0 20px 25px;">
            <button class="btn-skim mid" onclick="handleSkimAction('left')">알고 있어요</button>
            <button class="btn-skim hard" onclick="handleSkimAction('right')">학습할게요</button>
        </div>
    </div>

    <div id="screen-flashcard" class="screen hidden">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <button onclick="navigate('home')" style="background:none;">🏠</button>
            <div id="fc-counter" style="font-family: 'DM Mono'; font-weight: 700;">1 / 0</div>
            <div style="width: 20px;"></div>
        </div>
        <div class="swipe-zone" id="fc-zone"></div>
        <div style="padding: 0 20px 25px;">
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <button class="btn-skim hard" onclick="recordFC('hard')">몰랐어요</button>
                <button class="btn-skim mid" onclick="recordFC('mid')">헷갈려요</button>
                <button class="btn-skim easy" onclick="recordFC('easy')">쉬웠어요</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-skim mid" style="background:#333; color:white; flex:2;" onclick="flipFC()">뒷면보기</button>
                <button class="btn-skim mid" style="flex:1;" onclick="nextFC()">➔</button>
            </div>
        </div>
    </div>

    <div id="screen-goal" class="screen hidden" style="padding: 30px 20px; overflow-y: auto;">
        <h2 style="margin-bottom: 25px; font-weight: 900;">목표 설정하기 🎯</h2>
        <div style="margin-bottom: 20px;">
            <p style="font-size:14px; margin-bottom:10px;">현재 점수</p>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                <button class="menu-card" onclick="setGoal('current', 'none', this)">없음</button>
                <button class="menu-card" onclick="setGoal('current', 'N5', this)">N5</button>
                <button class="menu-card" onclick="setGoal('current', 'N3', this)">N3</button>
            </div>
        </div>
        <div style="margin-bottom: 20px;">
            <p style="font-size:14px; margin-bottom:10px;">목표 점수</p>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                <button class="menu-card" onclick="setGoal('target', 'N3', this)">N3</button>
                <button class="menu-card" onclick="setGoal('target', 'N2', this)">N2</button>
                <button class="menu-card" onclick="setGoal('target', 'N1', this)">N1</button>
            </div>
        </div>
        <div style="margin-bottom: 20px;">
            <p style="font-size:14px; margin-bottom:10px;">시험 일자</p>
            <input type="date" id="goal-date" onchange="checkGoalReady()" style="width:100%; padding:15px; border-radius:15px; border:1px solid var(--border);">
        </div>
        <div style="margin-bottom: 30px;">
            <p style="font-size:14px; margin-bottom:10px;">하루 학습량</p>
            <input type="number" id="goal-count" placeholder="예: 20" oninput="checkGoalReady()" style="width:100%; padding:15px; border-radius:15px; border:1px solid var(--border);">
        </div>
        <button id="btn-goal-complete" class="btn-skim hard" style="width:100%;" disabled onclick="completeGoal()">설정 완료</button>
    </div>

    <div id="screen-home" class="screen hidden" style="padding-bottom: 90px;">
        <div style="padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="home-title" style="font-size: 22px; font-weight: 900;">JLPT 정복</h2>
            <div id="home-dday" class="dday-chip">D-??</div>
        </div>
        <div class="cal-container" id="main-calendar"></div>
        <div class="menu-grid">
            <div class="menu-card" onclick="navigate('skimming')">⚡<br><div class="menu-label">스키밍</div></div>
            <div class="menu-card" onclick="startFC()">🃏<br><div class="menu-label">플래시카드</div></div>
            <div class="menu-card" onclick="alert('준비중!')">🧪<br><div class="menu-label">퀴즈</div></div>
        </div>
    </div>

    <div id="screen-library" class="screen hidden" style="padding: 25px 20px; overflow-y: auto; padding-bottom: 100px;">
        <h2 style="margin-bottom: 20px; font-weight: 900;">라이브러리 📚</h2>
        <div style="display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px;">
            <button class="menu-card" style="padding:10px 20px" onclick="renderLibrary('N5')">N5</button>
            <button class="menu-card" style="padding:10px 20px" onclick="renderLibrary('N4')">N4</button>
            <button class="menu-card" style="padding:10px 20px" onclick="renderLibrary('N3')">N3</button>
        </div>
        <div id="lib-list"></div>
    </div>

    <div id="detail-modal" class="screen hidden" style="background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px;" onclick="this.classList.add('hidden')">
        <div id="detail-card-content" style="width: 100%;" onclick="event.stopPropagation()"></div>
    </div>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="navigate('home', this)"><div class="nav-icon">🏠</div><div>홈</div></div>
        <div class="nav-item" onclick="navigate('library', this)"><div class="nav-icon">📚</div><div>라이브러리</div></div>
        <div class="nav-item" onclick="navigate('analysis', this)"><div class="nav-icon">📊</div><div>분석</div></div>
        <div class="nav-item" onclick="navigate('goal', this)"><div class="nav-icon">⚙️</div><div>설정</div></div>
        <div class="nav-item" onclick="navigate('skimming', this)"><div class="nav-icon">⚡</div><div>스키밍</div></div>
    </nav>
</div>

<script>
    let state = {
        isTutorial: true, tutIdx: 0, targetLvl: 'N3', dailyGoal: 20, examDate: '',
        db: [], library: [], skimmingQueue: [], skimIdx: 0,
        fcQueue: [], fcIdx: 0, fcResults: {}, history: {}, bookmarks: new Set()
    };

    const EMOJIS = ['🌸','🏯','🌊','🌙','🍱','🏮','⛩️','🗻'];

    // [증명: 고칠점 1] 데이터 로드 및 초기화
    async function init() {
        try {
            const res = await fetch('jlpt_n3_expanded.json');
            state.db = await res.json();
            console.log("Data Load Success:", state.db.length);
        } catch(e) { console.error("Data Load Fail"); }
    }

    // [증명: 수정본] 예문 후리가나 적용
    function applyRuby(text, alts) {
        if(!alts) return text;
        let html = text;
        alts.sort((a,b) => b.kanji.length - a.kanji.length).forEach(a => {
            html = html.replace(new RegExp(a.kanji, 'g'), `<ruby>${a.kanji}<rt>${a.furigana}</rt></ruby>`);
        });
        return html;
    }

    function renderCard(word, containerId, mode = 'skim') {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if(!word) return;
        const card = document.createElement('div');
        card.className = 'word-card';
        if(mode === 'fc-front') card.classList.add('fc-front');
        const isBm = state.bookmarks.has(word.id);
        
        if(mode === 'fc-front') {
            card.innerHTML = `<div class="fc-kanji">${word.kanji}</div><button onclick="speak('${word.kanji}')" style="font-size:30px; background:none;">🔊</button>`;
        } else {
            card.innerHTML = `
                <div class="swipe-overlay left"><h2>✅ 아는 단어</h2></div>
                <div class="swipe-overlay right"><h2>📖 학습할 단어</h2></div>
                <div class="c-img-wrap"><span>${EMOJIS[word.id % 8]}</span><div class="c-lvl-badge">${word.level}</div><div class="c-bookmark ${isBm?'active':''}" onclick="toggleBm(${word.id}, this)">🔖</div></div>
                <div class="c-body">
                    <div style="color:var(--accent); font-size:14px;">${word.furigana}</div>
                    <div class="c-kanji">${word.kanji} <span onclick="speak('${word.kanji}')" style="font-size:20px; cursor:pointer;">🔊</span></div>
                    <div class="c-pos">${word.pos}</div>
                    <div style="font-size:20px; font-weight:700;">${word.meaning}</div>
                    <div class="c-ex">
                        <p style="font-family:'Noto Sans JP';">${applyRuby(word.example_jp, word.alt_spellings)} <span onclick="speak('${word.example_jp}')" style="cursor:pointer;">🔊</span></p>
                        <p style="font-size:12px; color:var(--text-sub);">${word.example_kr}</p>
                    </div>
                </div>
            `;
        }
        container.appendChild(card);
        if(mode === 'skim') bindSwipe(card);
    }

    // [증명: 고칠점 1] 스키밍 액션
    function handleSkimAction(dir) {
        const word = state.isTutorial ? state.db[state.tutIdx] : state.skimmingQueue[state.skimIdx];
        if(dir === 'left' && word) state.library.push(word);
        
        if(state.isTutorial) {
            state.tutIdx++;
            if(state.tutIdx >= 6) { state.isTutorial = false; showScreen('goal'); }
            else updateSkimUI();
        } else {
            state.skimIdx++;
            if(state.skimIdx >= state.dailyGoal) navigate('home');
            else updateSkimUI();
        }
    }

    // [증명: 고칠점 2] 플래시카드 로직 수정
    function startFC() {
        state.fcQueue = state.library.length > 0 ? [...state.library] : state.db.slice(0, 5);
        state.fcIdx = 0;
        showScreen('flashcard');
        updateFCUI();
    }
    function updateFCUI() {
        document.getElementById('fc-counter').innerText = `${state.fcIdx+1} / ${state.fcQueue.length}`;
        renderCard(state.fcQueue[state.fcIdx], 'fc-zone', 'fc-front');
    }
    function recordFC(res) { alert(res + " 로 기록됨. ➔ 버튼을 눌러 다음으로 넘어가세요."); }
    function flipFC() { renderCard(state.fcQueue[state.fcIdx], 'fc-zone', 'back'); }
    function nextFC() {
        if(state.fcIdx < state.fcQueue.length - 1) { state.fcIdx++; updateFCUI(); }
        else { alert("학습 완료!"); navigate('home'); }
    }

    // [증명: 고칠점 3] 라이브러리 렌더링
    function renderLibrary(lv) {
        const list = document.getElementById('lib-list');
        list.innerHTML = '';
        const filtered = state.library.filter(w => w.level === lv);
        filtered.forEach((w, i) => {
            const item = document.createElement('div');
            item.className = 'lib-item';
            item.onclick = () => showDetail(w);
            item.innerHTML = `<div class="lib-num">${i+1}</div><div class="lib-kanji">${w.kanji}</div><div class="lib-mean">${w.meaning}</div>`;
            list.appendChild(item);
        });
    }
    function showDetail(word) {
        const modal = document.getElementById('detail-modal');
        modal.classList.remove('hidden');
        renderCard(word, 'detail-card-content', 'detail');
        const content = document.getElementById('detail-card-content').querySelector('.word-card');
        content.style.cssText = "position:relative; width:100%; height:auto;";
        const h = document.createElement('div');
        h.style.cssText = "padding:15px; font-size:11px; color:var(--text-sub); border-top:1px solid var(--border); text-align:center;";
        h.innerHTML = "📅 최초 학습: 방금 전 | 🔄 복습일 경과";
        content.appendChild(h);
    }

    // --- UTILS ---
    function navigate(id, el) {
        showScreen(id);
        if(id === 'home') {
            const d = Math.ceil((new Date(state.examDate)-new Date())/86400000);
            document.getElementById('home-dday').innerText = isNaN(d) ? 'D-??' : `D-${d}`;
            renderCalendar();
        }
        if(id === 'skimming') {
            state.skimmingQueue = state.db.filter(w => w.level === state.targetLvl).slice(0, state.dailyGoal);
            state.skimIdx = 0;
            updateSkimUI();
        }
        if(el) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
    }
    function updateSkimUI() {
        const word = state.isTutorial ? state.db[state.tutIdx] : state.skimmingQueue[state.skimIdx];
        if(!word) { alert("단어가 로드되지 않았거나 조건에 맞는 단어가 없습니다."); navigate('home'); return; }
        document.getElementById('skim-counter').innerText = state.isTutorial ? `${state.tutIdx+1} / 6` : `${state.skimIdx+1} / ${state.dailyGoal}`;
        renderCard(word, 'skim-zone', 'skim');
    }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.replace('active','hidden')); document.getElementById('screen-'+id).classList.replace('hidden','active'); }
    function setGoal(k, v, el) { state[k==='current'?'currentLvl':'targetLvl']=v; el.parentElement.querySelectorAll('.menu-card').forEach(b=>b.style.borderColor=''); el.style.borderColor='var(--primary)'; checkGoalReady(); }
    function checkGoalReady() { document.getElementById('btn-goal-complete').disabled = !(state.currentLvl && state.targetLvl && document.getElementById('goal-date').value && document.getElementById('goal-count').value); }
    function completeGoal() { state.examDate = document.getElementById('goal-date').value; state.dailyGoal = document.getElementById('goal-count').value; document.getElementById('bottom-nav').classList.remove('hidden'); navigate('home'); }
    function setTheme(t, el) { state.theme = t; document.querySelectorAll('#screen-onboarding .menu-card').forEach(b => b.style.borderColor = ''); el.style.borderColor = 'var(--primary)'; document.getElementById('btn-theme-confirm').disabled = false; }
    function showIntro() { showScreen('intro'); }
    function speak(t) { window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.8; window.speechSynthesis.speak(u); }
    function toggleBm(id, el) { if(state.bookmarks.has(id)){ state.bookmarks.delete(id); el.classList.remove('active'); } else { state.bookmarks.add(id); el.classList.add('active'); } }
    function bindSwipe(card) {
        let sx = 0, mx = 0;
        card.addEventListener('touchstart', e => sx = e.touches[0].clientX);
        card.addEventListener('touchmove', e => { mx = e.touches[0].clientX - sx; card.style.transform = `translateX(${mx}px) rotate(${mx/20}deg)`; if(mx<-50) card.classList.add('sw-left'); else if(mx>50) card.classList.add('sw-right'); else card.classList.remove('sw-left','sw-right'); });
        card.addEventListener('touchend', () => { if(Math.abs(mx)>120) handleSkimAction(mx<0?'left':'right'); else card.style.transform=''; card.classList.remove('sw-left','sw-right'); mx=0; });
    }
    function renderCalendar() {
        const grid = document.getElementById('main-calendar');
        grid.innerHTML = '<div class="cal-header"><h3>2026년 4월</h3></div><div class="cal-grid"></div>';
        const inner = grid.querySelector('.cal-grid');
        for(let d=1; d<=30; d++) { const dd = document.createElement('div'); dd.className = 'cal-day' + (d===5?' today':''); dd.innerText = d; inner.appendChild(dd); }
    }

    init();
</script>
</body>
</html>
