<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Swipe Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+KR:wght@500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* [REQ: 프롬프트 2] 글로벌 컬러 스킴 및 디자인 시스템 */
            --primary: #FF6B6B; --accent: #4ECDC4; --accent2: #FFE66D;
            --bg: #F5F5F7; --card-bg: #FFFFFF; --card-bg2: #F9F9FB;
            --text-main: #1D1D1F; --text-sub: #86868B; --text-muted: #B0B0B5;
            --border: rgba(0,0,0,0.08); --shadow: 0 15px 35px rgba(0,0,0,0.1);
            --radius: 25px; /* [REQ: 프롬프트 2. 컴포넌트 스타일] */
            --nav-h: 84px;
        }

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);overflow:hidden; height: 100vh;}
        button{cursor:pointer;border:none;outline:none;font-family:inherit;}
        ruby rt{font-size:0.55em;color:var(--primary);font-family:'Noto Sans JP',sans-serif;}
        .hidden{display:none !important;}

        #app{width:100%;max-width:430px;height:100vh;margin:0 auto;position:relative;overflow:hidden;}

        /* --- SCREENS --- */
        .screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s; z-index: 10; background: var(--bg);}
        .screen.active{opacity:1; pointer-events: all; transform: translateY(0);}
        .screen.hidden{opacity:0; pointer-events: none; transform: translateY(15px);}

        /* [REQ: 명세서 129] 카드 준비 완료 및 인트로 UI */
        .intro-preview{width:80%; background:var(--card-bg); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); margin:30px 0;}

        /* [REQ: 흐름도 4] 커스텀 캘린더 (수직 스크롤) */
        .cal-container { flex: 1; overflow-y: auto; padding: 20px; scroll-snap-type: y mandatory; }
        .cal-month { scroll-snap-align: start; margin-bottom: 25px; background: var(--card-bg); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 50%; }
        .cal-day.today { background: var(--primary); color: white; font-weight: 900; }
        .cal-day.done { background: var(--accent); color: white; }

        /* [REQ: 프롬프트 4.3] 스와이프 엔진 및 오버레이 */
        .swipe-zone { flex: 1; position: relative; perspective: 1000px; display: flex; align-items: center; justify-content: center; }
        .word-card { 
            position: absolute; width: 92%; height: 82%; background: var(--card-bg); border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
            display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .swipe-overlay { 
            position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            opacity: 0; pointer-events: none; backdrop-filter: blur(15px); transition: opacity 0.2s; /* [REQ: 프롬프트 4.3] 블러 효과 */
        }
        .word-card.sw-left .swipe-overlay.left { opacity: 1; background: rgba(78, 205, 196, 0.2); color: var(--accent); }
        .word-card.sw-right .swipe-overlay.right { opacity: 1; background: rgba(255, 107, 107, 0.2); color: var(--primary); }

        /* [REQ: 명세서 119] 카드 UI 구성 */
        .c-img { width: 100%; height: 180px; background: #eef; display: flex; align-items: center; justify-content: center; font-size: 80px; position: relative; }
        .c-bookmark { position: absolute; bottom: 15px; right: 15px; font-size: 24px; cursor: pointer; }
        .c-body { padding: 25px; flex: 1; display: flex; flex-direction: column; text-align: center; }
        .c-kanji { font-size: 48px; font-weight: 900; font-family: 'Noto Sans JP'; margin-bottom: 5px; }
        .c-meaning { font-size: 20px; font-weight: 700; color: var(--text-main); }
        .c-pos { font-size: 13px; color: var(--text-sub); margin-bottom: 15px; }
        .c-ex { background: var(--card-bg2); padding: 15px; border-radius: 15px; text-align: left; margin-top: auto; border-left: 5px solid var(--accent); }
        .c-lvl { position: absolute; bottom: 15px; left: 15px; background: var(--primary); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; }
        
        /* [REQ: 흐름도 2] 목표 설정 UI */
        .goal-btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .goal-opt { padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); background: white; font-weight: 700; color: var(--text-sub); }
        .goal-opt.active { border-color: var(--primary); color: var(--primary); background: rgba(255,107,107,0.05); }

        /* [REQ: 흐름도 3] 하단 네비게이션 바 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; height: var(--nav-h); background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .btn-primary { background: var(--primary); color: white; padding: 18px; border-radius: 20px; font-weight: 900; width: 100%; box-shadow: 0 10px 25px rgba(255,107,107,0.3); }
        .skim-actions { display: flex; gap: 12px; padding: 0 20px 25px; }
        .btn-skim { flex: 1; padding: 16px; border-radius: 18px; font-weight: 800; font-size: 15px; }
        .btn-skim.left { background: rgba(78, 205, 196, 0.1); color: var(--accent); border: 1.5px solid var(--accent); }
        .btn-skim.right { background: rgba(255, 107, 107, 0.1); color: var(--primary); border: 1.5px solid var(--primary); }
    </style>
</head>
<body>
<div id="app">
    <div id="screen-onboarding" class="screen active" style="align-items: center; justify-content: center; padding: 40px;">
        <h2 style="text-align: center; margin-bottom: 10px;">마음에 드는<br>카드 스타일을 고르세요</h2>
        <div style="display: flex; gap: 15px; width: 100%; margin: 25px 0;">
            <div class="goal-opt" style="flex:1; text-align: center; padding: 30px 10px;" onclick="setTheme('anime', this)">🎌 애니메이션</div>
            <div class="goal-opt" style="flex:1; text-align: center; padding: 30px 10px;" onclick="setTheme('realism', this)">📷 리얼리즘</div>
        </div>
        <button id="btn-theme-confirm" class="btn-primary" disabled onclick="showIntro()">이 스타일로 하기</button>
    </div>

    <div id="screen-intro" class="screen hidden" style="align-items: center; justify-content: center; padding: 30px;">
        <div class="intro-preview">
            <div style="font-size: 50px; text-align: center;">🌸</div>
            <div style="margin-top: 15px; text-align: center;">
                <p style="color: var(--accent); font-size: 14px;">さほう</p>
                <h2 style="font-family:'Noto Sans JP';">作法</h2>
                <p style="color: var(--text-sub);">예의범절, 예절</p>
            </div>
        </div>
        <h2 style="text-align: center;">지금 바로,<br>첫 번째 단어들을 펼쳐봅시다 🚀</h2>
        <button class="btn-primary" style="margin-top: 30px;" onclick="startSkimming(true)">스키밍 시작하기</button>
    </div>

    <div id="screen-skimming" class="screen hidden">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div id="skim-lvl-badge" style="font-weight: 900; color: var(--primary);">N3</div>
            <div id="skim-counter" style="font-family: 'DM Mono'; font-weight: 700;">1 / 6</div>
            <div style="width: 20px;"></div>
        </div>
        <div class="swipe-zone" id="skim-zone"></div>
        <div class="skim-actions">
            <button class="btn-skim left" onclick="handleSwipe('left')">알고 있어요</button>
            <button class="btn-skim right" onclick="handleSwipe('right')">학습할게요</button>
        </div>
    </div>

    <div id="screen-goal" class="screen hidden" style="padding: 30px 20px; overflow-y: auto;">
        <h2 style="margin-bottom: 25px; font-weight: 900;">목표 설정하기 🎯</h2>
        
        <p style="font-size: 14px; margin-bottom: 8px;">2-1. 현재 JLPT 점수</p>
        <div class="goal-btn-grid" id="goal-current">
            <button class="goal-opt" onclick="selectGoal('current', 'none', this)">없음</button>
            <button class="goal-opt" onclick="selectGoal('current', 'N5', this)">N5</button>
            <button class="goal-opt" onclick="selectGoal('current', 'N4', this)">N4</button>
            <button class="goal-opt" onclick="selectGoal('current', 'N3', this)">N3</button>
            <button class="goal-opt" onclick="selectGoal('current', 'N2', this)">N2</button>
            <button class="goal-opt" onclick="selectGoal('current', 'N1', this)">N1</button>
        </div>

        <p style="font-size: 14px; margin-bottom: 8px;">2-2. 목표 점수 (스키밍 레벨)</p>
        <div class="goal-btn-grid" id="goal-target">
            <button class="goal-opt" onclick="selectGoal('target', 'N5', this)">N5</button>
            <button class="goal-opt" onclick="selectGoal('target', 'N4', this)">N4</button>
            <button class="goal-opt" onclick="selectGoal('target', 'N3', this)">N3</button>
            <button class="goal-opt" onclick="selectGoal('target', 'N2', this)">N2</button>
            <button class="goal-opt" onclick="selectGoal('target', 'N1', this)">N1</button>
        </div>

        <p style="font-size: 14px; margin-bottom: 8px;">2-3. 시험 일자</p>
        <input type="date" id="goal-date" style="width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid var(--border); margin-bottom: 20px;">

        <p style="font-size: 14px; margin-bottom: 8px;">2-4. 하루 단어 학습량</p>
        <input type="number" id="goal-count" placeholder="예: 20" style="width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid var(--border); margin-bottom: 30px;">

        <button class="btn-primary" onclick="completeGoalSetting()">설정 완료 및 시작</button>
    </div>

    <div id="screen-home" class="screen hidden" style="padding-bottom: 90px;">
        <div style="padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="home-title" style="font-size: 22px; font-weight: 900;">N3 정복 프로젝트</h2>
            <div id="home-dday" style="background: var(--primary); color: white; padding: 6px 14px; border-radius: 20px; font-family: 'DM Mono'; font-weight: 700;">D-??</div>
        </div>
        <div class="cal-container" id="main-calendar"></div>
    </div>

    <div id="screen-library" class="screen hidden" style="padding: 25px 20px; overflow-y: auto; padding-bottom: 100px;">
        <h2 style="margin-bottom: 20px;">라이브러리 📚</h2>
        <div style="display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px;">
            <button class="goal-opt" onclick="renderLibrary('N5')">N5</button>
            <button class="goal-opt" onclick="renderLibrary('N4')">N4</button>
            <button class="goal-opt" onclick="renderLibrary('N3')">N3</button>
            <button class="goal-opt" onclick="renderLibrary('N2')">N2</button>
            <button class="goal-opt" onclick="renderLibrary('N1')">N1</button>
        </div>
        <div id="lib-list" style="display: grid; grid-template-columns: 1fr; gap: 15px;"></div>
    </div>

    <div id="screen-analysis" class="screen hidden" style="align-items: center; justify-content: center; text-align: center; padding: 40px;">
        <div style="font-size: 60px; margin-bottom: 20px;">🚧</div>
        <h3>아직 개발 중입니다</h3>
        <p style="color: var(--text-sub); margin-top: 10px;">곧 학습 분석 리포트를 제공할 예정입니다.</p>
    </div>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="navigate('home', this)"><div class="nav-icon">🏠</div><div>홈</div></div>
        <div class="nav-item" onclick="navigate('skimming', this)"><div class="nav-icon">⚡</div><div>스키밍</div></div>
        <div class="nav-item" onclick="navigate('library', this)"><div class="nav-icon">📚</div><div>라이브러리</div></div>
        <div class="nav-item" onclick="navigate('analysis', this)"><div class="nav-icon">📊</div><div>분석</div></div>
        <div class="nav-item" onclick="navigate('goal', this)"><div class="nav-icon">⚙️</div><div>설정</div></div>
    </nav>
</div>

<script>
    // --- [REQ: 데이터 아키텍처] ---
    let state = {
        phase: 'onboarding', isTutorial: true, tutIdx: 0,
        theme: '', currentLvl: '', targetLvl: 'N3', examDate: '', dailyGoal: 20,
        db: [], library: [], skimmingQueue: [], skimIdx: 0, history: {}, bookmarks: new Set()
    };

    // --- [REQ: 초기화 & 데이터 로드] ---
    async function init() {
        try {
            const res = await fetch('jlpt_n3_expanded.json');
            state.db = await res.json();
            const saved = localStorage.getItem('master_pro_v1');
            if(saved) {
                state = {...state, ...JSON.parse(saved)};
                state.bookmarks = new Set(state.bookmarks);
                if(state.phase === 'main') {
                    showScreen('home');
                    document.getElementById('bottom-nav').classList.remove('hidden');
                }
            }
        } catch(e) { console.error("JSON 로드 실패. 대체 데이터 사용."); }
    }

    // --- [REQ: 명세서 115, 116] 온보딩 로직 ---
    function setTheme(t, el) {
        state.theme = t;
        document.querySelectorAll('#screen-onboarding .goal-opt').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('btn-theme-confirm').disabled = false;
    }
    function showIntro() { showScreen('intro'); }

    // --- [REQ: 흐름도 5, 6 / 프롬프트 4.3] 스와이프 엔진 ---
    function renderCard(word) {
        const zone = document.getElementById('skim-zone');
        zone.innerHTML = '';
        const card = document.createElement('div');
        card.className = 'word-card';
        const isBm = state.bookmarks.has(word.id);
        
        card.innerHTML = `
            <div class="swipe-overlay left"><h2>✅ 아는 단어</h2><p>라이브러리에 숨겨둘게요</p></div>
            <div class="swipe-overlay right"><h2>📖 학습할 단어</h2><p>플래시카드에서 만나요</p></div>
            <div class="c-img">🖼️<div class="c-lvl">${word.level}</div><div class="c-bookmark" onclick="toggleBm(${word.id}, this)">${isBm?'🔖':'🏷️'}</div></div>
            <div class="c-body">
                <div class="c-furi">${word.furigana}</div>
                <div class="c-kanji">${word.kanji}</div>
                <div class="c-meaning">${word.meaning}</div>
                <div class="c-pos">[${word.pos}]</div>
                <div class="c-ex">
                    <p style="font-family:'Noto Sans JP'; margin-bottom:5px;">${word.example_jp} <span onclick="speak('${word.kanji}')">🔊</span></p>
                    <p style="font-size:12px; color:var(--text-sub);">${word.example_kr}</p>
                </div>
            </div>
            <div style="padding:15px; border-top:1px solid var(--border); text-align:right;">
                <button onclick="alert('💡 팁: ${word.tips[0]?.meaning || "없음"}')" style="color:var(--primary); font-weight:700; background:none;">팁 💡</button>
            </div>
        `;
        zone.appendChild(card);
        bindSwipe(card);
    }

    function bindSwipe(card) {
        let startX = 0, moveX = 0;
        const start = (e) => { startX = e.type.includes('touch')?e.touches[0].clientX:e.clientX; card.style.transition = 'none'; };
        const move = (e) => {
            if(!startX) return;
            moveX = (e.type.includes('touch')?e.touches[0].clientX:e.clientX) - startX;
            let rot = moveX / 20; /* [REQ: 프롬프트 4.3] 물리 회전 계산 */
            card.style.transform = `translateX(${moveX}px) rotate(${rot}deg)`;
            if(moveX < -50) card.classList.add('sw-left');
            else if(moveX > 50) card.classList.add('sw-right');
            else card.classList.remove('sw-left', 'sw-right');
        };
        const end = () => {
            if(Math.abs(moveX) > 120) handleSwipe(moveX < 0 ? 'left' : 'right');
            else { card.style.transition = '0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; card.style.transform = ''; card.classList.remove('sw-left', 'sw-right'); }
            startX = 0; moveX = 0;
        };
        card.addEventListener('touchstart', start); card.addEventListener('mousedown', start);
        window.addEventListener('touchmove', move); window.addEventListener('mousemove', move);
        window.addEventListener('touchend', end); window.addEventListener('mouseup', end);
    }

    function handleSwipe(dir) {
        if(state.isTutorial) {
            state.tutIdx++;
            if(state.tutIdx >= 6) { state.isTutorial = false; showScreen('goal'); }
            else updateSkimUI();
        } else {
            const word = state.skimmingQueue[state.skimIdx];
            if(dir === 'left') { if(!state.library.find(w=>w.id===word.id)) state.library.push(word); }
            const today = new Date().toDateString();
            state.history[today] = (state.history[today] || 0) + 1;
            state.skimIdx++;
            if(state.skimIdx >= state.dailyGoal) { alert("오늘의 목표 달성!"); navigate('home'); }
            else updateSkimUI();
        }
        save();
    }

    // --- [REQ: 흐름도 2] 목표 설정 완료 ---
    function selectGoal(key, val, el) {
        state[key + (key==='target'?'Lvl':'Lvl')] = val; // currentLvl, targetLvl
        if(key === 'current') state.currentLvl = val; else state.targetLvl = val;
        el.parentElement.querySelectorAll('.goal-opt').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
    function completeGoalSetting() {
        state.examDate = document.getElementById('goal-date').value;
        state.dailyGoal = parseInt(document.getElementById('goal-count').value) || 20;
        state.phase = 'main';
        document.getElementById('bottom-nav').classList.remove('hidden');
        navigate('home');
        save();
    }

    // --- [REQ: 흐름도 4] 커스텀 세로 스크롤 캘린더 ---
    function renderCalendar() {
        const container = document.getElementById('main-calendar');
        container.innerHTML = '';
        const today = new Date();
        for(let i=-1; i<4; i++) { // 이전 1달 ~ 이후 4달
            const m = new Date(today.getFullYear(), today.getMonth() + i, 1);
            const div = document.createElement('div');
            div.className = 'cal-month';
            div.innerHTML = `<h3>${m.getFullYear()}년 ${m.getMonth()+1}월</h3><div class="cal-grid"></div>`;
            const grid = div.querySelector('.cal-grid');
            const days = new Date(m.getFullYear(), m.getMonth()+1, 0).getDate();
            const startDay = new Date(m.getFullYear(), m.getMonth(), 1).getDay();
            for(let e=0; e<startDay; e++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const dateStr = new Date(m.getFullYear(), m.getMonth(), d).toDateString();
                const dayDiv = document.createElement('div');
                dayDiv.className = `cal-day ${dateStr === today.toDateString()?'today':''} ${state.history[dateStr]>=state.dailyGoal?'done':''}`;
                dayDiv.innerText = d;
                grid.appendChild(dayDiv);
            }
            container.appendChild(div);
        }
    }

    // --- [REQ: 흐름도 7] 라이브러리 카드 렌더링 ---
    function renderLibrary(lv) {
        const list = document.getElementById('lib-list');
        list.innerHTML = '';
        const filtered = state.library.filter(w => w.level === lv);
        if(!filtered.length) { list.innerHTML = '<p style="text-align:center; color:var(--text-muted);">저장된 단어가 없습니다.</p>'; return; }
        filtered.forEach(w => {
            const item = document.createElement('div');
            item.className = 'cal-month';
            item.style.cssText = 'padding:15px; margin-bottom:0; text-align:left; scroll-snap-align: none;';
            item.innerHTML = `<b>${w.kanji}</b> [${w.furigana}]<br><span style="font-size:14px; color:var(--primary);">${w.meaning}</span>`;
            list.appendChild(item);
        });
    }

    // --- 유틸리티 함수 ---
    function navigate(id, el) {
        showScreen(id);
        if(id === 'home') {
            renderCalendar();
            if(state.examDate) {
                const d = Math.ceil((new Date(state.examDate)-new Date())/86400000);
                document.getElementById('home-dday').innerText = d>=0?`D-${d}`:`D+${Math.abs(d)}`;
            }
        }
        if(id === 'skimming') {
            state.skimmingQueue = state.db.filter(w=>w.level===state.targetLvl).slice(0, state.dailyGoal);
            state.skimIdx = 0;
            updateSkimUI();
        }
        if(id === 'library') renderLibrary(state.targetLvl);
        if(el) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
    }

    function updateSkimUI() {
        const word = state.isTutorial ? state.db[state.tutIdx] : state.skimmingQueue[state.skimIdx];
        document.getElementById('skim-counter').innerText = state.isTutorial ? `${state.tutIdx+1} / 6` : `${state.skimIdx+1} / ${state.dailyGoal}`;
        document.getElementById('skim-lvl-badge').innerText = word.level;
        renderCard(word);
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.replace('active','hidden')); document.getElementById('screen-'+id).classList.replace('hidden','active'); }
    function speak(t) { const u=new SpeechSynthesisUtterance(t); u.lang='ja-JP'; speechSynthesis.speak(u); }
    function toggleBm(id, el) { if(state.bookmarks.has(id)){ state.bookmarks.delete(id); el.innerText='🏷️'; } else { state.bookmarks.add(id); el.innerText='🔖'; } save(); }
    function save() { const toSave = {...state, bookmarks: Array.from(state.bookmarks)}; localStorage.setItem('master_pro_v1', JSON.stringify(toSave)); }

    init();
</script>
</body>
</html>
