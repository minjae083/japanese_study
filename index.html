<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Swipe Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+KR:wght@500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B; --accent: #4ECDC4; --accent2: #FFE66D;
            --bg: #0F0F10; --card-bg: #1A1A1C; --card-bg2: #222225;
            --text-main: #F0F0F2; --text-sub: #888896; --text-muted: #555560;
            --border: rgba(255,255,255,0.07); --shadow: 0 25px 50px rgba(0,0,0,0.6);
            --radius: 28px; --radius-sm: 16px; --nav-h: 80px;
        }

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);overflow:hidden; height: 100vh;}
        button{cursor:pointer;border:none;outline:none;font-family:inherit;}
        ruby rt{font-size:0.55em;color:var(--accent);font-family:'Noto Sans JP',sans-serif;}
        .hidden{display:none !important;}

        #app{width:100%;max-width:430px;height:100vh;margin:0 auto;position:relative;overflow:hidden;}

        /* --- SCREENS --- */
        .screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s, transform .3s; z-index: 10;}
        .screen.active{opacity:1; transform: translateY(0); pointer-events: all;}
        .screen.hidden{opacity:0; transform: translateY(20px); pointer-events: none;}

        /* --- CUSTOM CALENDAR (Vertical Scroll) --- */
        .cal-container { flex: 1; overflow-y: auto; padding: 20px; scroll-snap-type: y mandatory; }
        .cal-month { scroll-snap-align: start; margin-bottom: 30px; background: var(--card-bg); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
        .cal-month h3 { margin-bottom: 15px; font-family: 'DM Mono'; color: var(--accent); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 50%; border: 1px solid transparent; }
        .cal-day.today { border-color: var(--primary); color: var(--primary); font-weight: 900; }
        .cal-day.done { background: rgba(78,205,196,0.15); color: var(--accent); font-weight: 700; }

        /* --- SWIPE CARDS --- */
        .swipe-zone { flex: 1; position: relative; perspective: 1000px; display: flex; align-items: center; justify-content: center; }
        .word-card { 
            position: absolute; width: 90%; height: 82%; background: var(--card-bg); border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
            display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; cursor: grab;
        }
        .swipe-overlay { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; backdrop-filter: blur(8px); transition: 0.2s; }
        .swipe-overlay.left { background: rgba(255,107,107,0.4); color: white; }
        .swipe-overlay.right { background: rgba(78,205,196,0.4); color: white; }
        .word-card.sw-left .swipe-overlay.left { opacity: 1; }
        .word-card.sw-right .swipe-overlay.right { opacity: 1; }

        /* --- CARD UI --- */
        .c-img { width: 100%; height: 180px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 80px; position: relative; }
        .c-level { position: absolute; top: 15px; left: 15px; background: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 900; }
        .c-body { padding: 20px; flex: 1; display: flex; flex-direction: column; text-align: center; }
        .c-kanji { font-size: 44px; font-weight: 900; font-family: 'Noto Sans JP'; margin-bottom: 5px; }
        .c-meaning { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 15px; }
        .c-ex { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; text-align: left; margin-top: auto; border-left: 4px solid var(--accent); }
        
        /* --- BUTTONS --- */
        .btn-primary { background: var(--primary); color: white; padding: 18px; border-radius: 20px; font-weight: 900; width: 100%; }
        .skim-btns { display: flex; gap: 10px; padding: 0 20px 20px; }
        .btn-skim { flex: 1; padding: 15px; border-radius: 15px; font-weight: 700; font-size: 14px; }
        .btn-skim.know { background: rgba(255,107,107,0.1); color: var(--primary); border: 1px solid var(--primary); }
        .btn-skim.learn { background: rgba(78,205,196,0.1); color: var(--accent); border: 1px solid var(--accent); }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; height: var(--nav-h); background: #121214; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
<div id="app">
    <div id="screen-tutorial" class="screen">
        <div style="padding: 40px 20px; text-align: center;">
            <h2 id="tut-progress">튜토리얼 (1/6)</h2>
            <p style="color: var(--text-sub); margin-top: 5px;">카드를 스와이프하여 학습을 시작하세요</p>
        </div>
        <div class="swipe-zone" id="tut-zone"></div>
        <div class="skim-btns">
            <button class="btn-skim know" onclick="handleAction('left')">알고 있어요</button>
            <button class="btn-skim learn" onclick="handleAction('right')">학습할게요</button>
        </div>
    </div>

    <div id="screen-goal" class="screen hidden" style="padding: 30px 20px; overflow-y: auto;">
        <h2 style="font-size: 26px; margin-bottom: 25px;">목표 설정하기 🎯</h2>
        
        <div style="margin-bottom: 20px;">
            <p style="font-size: 14px; color: var(--text-sub); margin-bottom: 8px;">2-1. 현재 JLPT 점수</p>
            <div id="picker-current" class="picker-group" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                <button class="btn-skim learn" onclick="setGoal('current', 'none', this)">없습니다</button>
                <button class="btn-skim learn" onclick="setGoal('current', 'N5', this)">N5</button>
                <button class="btn-skim learn" onclick="setGoal('current', 'N4', this)">N4</button>
                <button class="btn-skim learn" onclick="setGoal('current', 'N3', this)">N3</button>
                <button class="btn-skim learn" onclick="setGoal('current', 'N2', this)">N2</button>
                <button class="btn-skim learn" onclick="setGoal('current', 'N1', this)">N1</button>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <p style="font-size: 14px; color: var(--text-sub); margin-bottom: 8px;">2-2. 목표 점수 (스키밍 레벨)</p>
            <div id="picker-target" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                <button class="btn-skim learn" onclick="setGoal('target', 'N5', this)">N5</button>
                <button class="btn-skim learn" onclick="setGoal('target', 'N4', this)">N4</button>
                <button class="btn-skim learn" onclick="setGoal('target', 'N3', this)">N3</button>
                <button class="btn-skim learn" onclick="setGoal('target', 'N2', this)">N2</button>
                <button class="btn-skim learn" onclick="setGoal('target', 'N1', this)">N1</button>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <p style="font-size: 14px; color: var(--text-sub); margin-bottom: 8px;">2-3. 시험 일자 선택</p>
            <input type="date" id="goal-date" onchange="setGoal('date', this.value)" style="width: 100%; padding: 15px; border-radius: 12px; background: var(--card-bg); color: white; border: 1px solid var(--border);">
        </div>

        <div style="margin-bottom: 30px;">
            <p style="font-size: 14px; color: var(--text-sub); margin-bottom: 8px;">2-4. 하루 학습 단어 수</p>
            <input type="number" id="goal-count" placeholder="예: 20" onchange="setGoal('count', this.value)" style="width: 100%; padding: 15px; border-radius: 12px; background: var(--card-bg); color: white; border: 1px solid var(--border);">
        </div>

        <button class="btn-primary" onclick="finishGoalSetting()">설정 완료 및 시작</button>
    </div>

    <div id="screen-home" class="screen hidden" style="padding-bottom: 80px;">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="home-title">JLPT N3 마스터</h2>
            <div id="home-dday" style="background: var(--primary); padding: 5px 15px; border-radius: 20px; font-family: 'DM Mono'; font-weight: 700;">D-91</div>
        </div>
        <div class="cal-container" id="main-calendar"></div>
    </div>

    <div id="screen-skimming" class="screen hidden">
        <div style="padding: 20px; display:flex; justify-content: space-between;">
            <div id="skim-level-tag" style="color: var(--accent); font-weight: 900;">N3</div>
            <div id="skim-progress">1 / 20</div>
        </div>
        <div class="swipe-zone" id="skim-zone"></div>
        <div class="skim-btns">
            <button class="btn-skim know" onclick="handleAction('left')">알고 있어요</button>
            <button class="btn-skim learn" onclick="handleAction('right')">학습할게요</button>
        </div>
    </div>

    <div id="screen-library" class="screen hidden" style="padding: 20px; overflow-y: auto; padding-bottom: 100px;">
        <h2 style="margin-bottom: 15px;">라이브러리 📚</h2>
        <div id="lib-tabs" style="display:flex; gap:10px; margin-bottom: 20px; overflow-x: auto;">
            <button class="btn-skim learn" onclick="filterLibrary('N5')">N5</button>
            <button class="btn-skim learn" onclick="filterLibrary('N4')">N4</button>
            <button class="btn-skim learn" onclick="filterLibrary('N3')">N3</button>
            <button class="btn-skim learn" onclick="filterLibrary('N2')">N2</button>
            <button class="btn-skim learn" onclick="filterLibrary('N1')">N1</button>
        </div>
        <div id="lib-list" style="display: grid; grid-template-columns: 1fr; gap: 15px;"></div>
    </div>

    <div id="screen-analysis" class="screen hidden" style="display:flex; align-items:center; justify-content:center;">
        <h3 style="color: var(--text-sub);">🚧 분석 기능 개발 중입니다 🚧</h3>
    </div>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="navigate('home', this)">🏠<br>홈</div>
        <div class="nav-item" onclick="navigate('skimming', this)">⚡<br>스키밍</div>
        <div class="nav-item" onclick="navigate('library', this)">📚<br>라이브러리</div>
        <div class="nav-item" onclick="navigate('analysis', this)">📊<br>분석</div>
        <div class="nav-item" onclick="navigate('goal', this)">⚙️<br>설정</div>
    </nav>
</div>

<script>
    // --- STATE ---
    let state = {
        phase: 'tutorial', tutorialIdx: 0,
        currentLevel: 'none', targetLevel: 'N3', examDate: '', dailyCount: 20,
        db: [], library: [], skimmingQueue: [], currentSkimIdx: 0,
        history: {} // 날짜별 학습량 저장
    };

    const EMOJIS = ['🌸','🏯','🌊','🌙','🍱','🏮'];

    // --- INIT ---
    async function init() {
        try {
            const res = await fetch('jlpt_n3_expanded.json');
            state.db = await res.json();
            const saved = localStorage.getItem('jlpt_swipe_pro');
            if(saved) {
                state = {...state, ...JSON.parse(saved)};
                if(state.phase !== 'tutorial') startApp();
                else renderTutorialCard();
            } else {
                renderTutorialCard();
            }
        } catch (e) { console.error("데이터 로드 실패", e); }
    }

    // --- UI ENGINE ---
    function renderCard(containerId, word) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="swipe-overlay left"><h2>✅ 아는 단어</h2><p>라이브러리에 넣을게요</p></div>
            <div class="swipe-overlay right"><h2>🃏 학습할 단어</h2><p>플래시 카드에서 만나요</p></div>
            <div class="c-img"><span>${EMOJIS[word.id % 6]}</span><div class="c-level">${word.level}</div></div>
            <div class="c-body">
                <div style="color: var(--accent); font-size: 14px;">${word.furigana}</div>
                <div class="c-kanji">${word.kanji}</div>
                <div class="c-meaning">${word.meaning}</div>
                <div class="c-ex">
                    <div style="font-family:'Noto Sans JP'; font-size:15px; margin-bottom:5px;">${word.example_jp}</div>
                    <div style="font-size:13px; color: var(--text-sub);">${word.example_kr}</div>
                </div>
            </div>
            <div style="padding: 15px; display:flex; justify-content: space-around; border-top: 1px solid var(--border);">
                <button onclick="speak('${word.kanji}')">🔊 소리</button>
                <button onclick="alert('관련어: ${word.tips[0]?.meaning || "없음"}')">💡 팁</button>
                <button onclick="this.innerText='🔖'">🏷️ 북마크</button>
            </div>
        `;
        container.appendChild(card);
        bindSwipe(card);
    }

    function bindSwipe(card) {
        let startX = 0, moveX = 0;
        card.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        card.addEventListener('touchmove', e => {
            moveX = e.touches[0].clientX - startX;
            let rot = moveX / 15;
            card.style.transform = `translateX(${moveX}px) rotate(${rot}deg)`;
            if(moveX < -50) card.classList.add('sw-left');
            else if(moveX > 50) card.classList.add('sw-right');
            else card.classList.remove('sw-left', 'sw-right');
        });
        card.addEventListener('touchend', () => {
            if(Math.abs(moveX) > 120) handleAction(moveX < 0 ? 'left' : 'right');
            else { card.style.transform = ''; card.classList.remove('sw-left', 'sw-right'); }
            moveX = 0;
        });
    }

    function handleAction(dir) {
        if(state.phase === 'tutorial') {
            state.tutorialIdx++;
            if(state.tutorialIdx >= 6) {
                state.phase = 'goal';
                showScreen('goal');
            } else renderTutorialCard();
        } else {
            const word = state.skimmingQueue[state.currentSkimIdx];
            if(dir === 'left') {
                if(!state.library.find(w => w.id === word.id)) state.library.push(word);
            }
            // 일일 학습량 기록
            const today = new Date().toDateString();
            state.history[today] = (state.history[today] || 0) + 1;
            
            state.currentSkimIdx++;
            if(state.currentSkimIdx >= state.dailyCount) {
                alert("오늘의 목표 달성!");
                navigate('home');
            } else renderSkimCard();
        }
        save();
    }

    // --- LOGIC ---
    function setGoal(key, val, el) {
        state[key] = val;
        if(el) {
            el.parentElement.querySelectorAll('button').forEach(b => b.style.borderColor = '');
            el.style.borderColor = 'var(--primary)';
        }
    }

    function finishGoalSetting() {
        state.phase = 'main';
        startApp();
    }

    function startApp() {
        showScreen('home');
        document.getElementById('bottom-nav').classList.remove('hidden');
        document.getElementById('home-title').innerText = `JLPT ${state.targetLevel} 마스터`;
        
        // D-Day
        if(state.examDate) {
            const d = Math.ceil((new Date(state.examDate) - new Date()) / (86400000));
            document.getElementById('home-dday').innerText = `D-${d}`;
        }

        renderCalendar();
        // 스키밍 큐 설정
        state.skimmingQueue = state.db.filter(w => w.level === state.targetLevel).slice(0, state.dailyCount);
        state.currentSkimIdx = 0;
    }

    function renderCalendar() {
        const container = document.getElementById('main-calendar');
        container.innerHTML = '';
        const today = new Date();
        for(let i=0; i<3; i++) { // 3개월치 생성
            const m = new Date(today.getFullYear(), today.getMonth() + i, 1);
            const monthDiv = document.createElement('div');
            monthDiv.className = 'cal-month';
            monthDiv.innerHTML = `<h3>${m.getFullYear()}년 ${m.getMonth()+1}월</h3><div class="cal-grid"></div>`;
            const grid = monthDiv.querySelector('.cal-grid');
            const daysInMonth = new Date(m.getFullYear(), m.getMonth()+1, 0).getDate();
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = new Date(m.getFullYear(), m.getMonth(), d).toDateString();
                const dayDiv = document.createElement('div');
                dayDiv.className = `cal-day ${dateStr === today.toDateString() ? 'today' : ''} ${state.history[dateStr] >= state.dailyCount ? 'done' : ''}`;
                dayDiv.innerText = d;
                grid.appendChild(dayDiv);
            }
            container.appendChild(monthDiv);
        }
    }

    function renderTutorialCard() {
        document.getElementById('tut-progress').innerText = `튜토리얼 (${state.tutorialIdx+1}/6)`;
        renderCard('tut-zone', state.db[state.tutorialIdx]);
    }

    function renderSkimCard() {
        document.getElementById('skim-progress').innerText = `${state.currentSkimIdx+1} / ${state.dailyCount}`;
        document.getElementById('skim-level-tag').innerText = state.targetLevel;
        renderCard('skim-zone', state.skimmingQueue[state.currentSkimIdx]);
    }

    function filterLibrary(lv) {
        const list = document.getElementById('lib-list');
        list.innerHTML = '';
        const filtered = state.library.filter(w => w.level === lv);
        filtered.forEach(w => {
            list.innerHTML += `<div class="cal-month" style="margin-bottom:10px; padding:15px;"><b>${w.kanji}</b> [${w.furigana}]<br><small>${w.meaning}</small></div>`;
        });
    }

    // --- NAVIGATION ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('screen-'+id).classList.remove('hidden');
    }

    function navigate(id, el) {
        showScreen(id);
        if(id === 'skimming') renderSkimCard();
        if(id === 'home') renderCalendar();
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        speechSynthesis.speak(u);
    }

    function save() { localStorage.setItem('jlpt_swipe_pro', JSON.stringify(state)); }

    init();
</script>
</body>
</html>
