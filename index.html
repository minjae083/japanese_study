<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Swipe Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+KR:wght@500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B; --accent: #4ECDC4; --accent2: #FFE66D;
            --bg: #0F0F10; --card-bg: #1A1A1C; --card-bg2: #222225;
            --text-main: #F0F0F2; --text-sub: #888896; --text-muted: #555560;
            --border: rgba(255,255,255,0.07); --shadow: 0 25px 50px rgba(0,0,0,0.6);
            --radius: 28px; --radius-sm: 16px; --nav-h: 80px;
        }

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);overflow:hidden; height: 100vh;}
        button{cursor:pointer;border:none;outline:none;font-family:inherit;}
        ruby rt{font-size:0.55em;color:var(--accent);font-family:'Noto Sans JP',sans-serif;}
        .hidden{display:none !important;}

        #app{width:100%;max-width:430px;height:100vh;margin:0 auto;position:relative;overflow:hidden;background:var(--bg);}

        /* --- SCREENS --- */
        .screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s, transform .3s;}
        
        /* --- CALENDAR (Vertical Scroll) --- */
        .cal-container { flex: 1; overflow-y: auto; padding: 10px; scroll-snap-type: y mandatory; }
        .cal-month { scroll-snap-align: start; margin-bottom: 30px; background: var(--card-bg); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 50%; position: relative; }
        .cal-day.today { border: 2px solid var(--primary); font-weight: 900; }
        .cal-day.done { background: rgba(78,205,196,0.2); color: var(--accent); font-weight: 700; }
        .cal-dot { position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }

        /* --- SWIPE ENGINE --- */
        .swipe-zone { flex: 1; position: relative; perspective: 1000px; display: flex; align-items: center; justify-content: center; }
        .word-card { 
            position: absolute; width: 90%; height: 85%; background: var(--card-bg); border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
            display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .swipe-overlay { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; backdrop-filter: blur(10px); transition: 0.2s; }
        .word-card.sw-left .swipe-overlay.left { opacity: 1; background: rgba(255,107,107,0.3); }
        .word-card.sw-right .swipe-overlay.right { opacity: 1; background: rgba(78,205,196,0.3); }

        /* --- UI COMPONENTS --- */
        .c-img { width: 100%; height: 180px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 80px; position: relative; }
        .c-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .c-kanji { font-size: 48px; font-weight: 900; font-family: 'Noto Sans JP'; text-align: center; }
        .c-meaning { font-size: 20px; font-weight: 700; color: var(--text-main); text-align: center; }
        .c-ex { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); margin-top: auto; }
        .btn-primary { background: var(--primary); color: white; padding: 18px; border-radius: 20px; font-weight: 900; width: 100%; box-shadow: 0 10px 20px rgba(255,107,107,0.3); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; height: var(--nav-h); background: #121214; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-muted); }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
<div id="app">
    <div id="screen-tutorial" class="screen">
        <div style="padding: 40px 20px; text-align: center;">
            <h2 id="tut-title">기초 실력 테스트 (1/6)</h2>
            <p style="color: var(--text-sub);">아는 단어는 왼쪽, 공부할 단어는 오른쪽!</p>
        </div>
        <div class="swipe-zone" id="tut-zone"></div>
    </div>

    <div id="screen-goal" class="screen hidden" style="padding: 30px 20px; overflow-y: auto;">
        <h2 style="font-size: 28px; margin-bottom: 20px;">목표 설정 🎯</h2>
        
        <label style="display:block; margin-bottom: 10px;">2-1. 현재 JLPT 점수</label>
        <select id="goal-current" style="width:100%; padding:15px; background:var(--card-bg); color:white; border-radius:10px; margin-bottom:20px;">
            <option value="none">없습니다</option>
            <option value="N5">N5</option><option value="N4">N4</option><option value="N3">N3</option><option value="N2">N2</option><option value="N1">N1</option>
        </select>

        <label style="display:block; margin-bottom: 10px;">2-2. 목표 점수 (학습 레벨)</label>
        <select id="goal-target" style="width:100%; padding:15px; background:var(--card-bg); color:white; border-radius:10px; margin-bottom:20px;">
            <option value="N5">N5</option><option value="N4">N4</option><option value="N3" selected>N3</option><option value="N2">N2</option><option value="N1">N1</option>
        </select>

        <label style="display:block; margin-bottom: 10px;">2-3. 시험 일자</label>
        <input type="date" id="goal-date" style="width:100%; padding:15px; background:var(--card-bg); color:white; border-radius:10px; margin-bottom:20px;">

        <label style="display:block; margin-bottom: 10px;">2-4. 하루 학습 단어 수</label>
        <input type="number" id="goal-count" value="20" style="width:100%; padding:15px; background:var(--card-bg); color:white; border-radius:10px; margin-bottom:30px;">

        <button class="btn-primary" onclick="saveGoals()">학습 시작하기</button>
    </div>

    <div id="screen-home" class="screen hidden" style="padding-bottom: 80px;">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="home-user-info">N3 정복까지</h2>
            <div id="home-dday" style="background: var(--primary); padding: 5px 15px; border-radius: 20px; font-family: 'DM Mono';">D-91</div>
        </div>
        <div class="cal-container" id="home-calendar">
            </div>
    </div>

    <div id="screen-skimming" class="screen hidden">
        <div style="padding: 20px; display: flex; justify-content: space-between;">
            <button onclick="changeScreen('home')">🏠</button>
            <div id="skim-counter">1 / 20</div>
            <div></div>
        </div>
        <div class="swipe-zone" id="skim-zone"></div>
        <div style="padding: 20px; display: flex; gap: 10px;">
            <button class="btn-primary" style="background: var(--card-bg); color: var(--primary);" onclick="handleSwipe('left')">알고 있어요</button>
            <button class="btn-primary" onclick="handleSwipe('right')">학습할게요</button>
        </div>
    </div>

    <div id="screen-library" class="screen hidden" style="padding: 20px; overflow-y: auto;">
        <h2>라이브러리 📚</h2>
        <div style="display: flex; gap: 10px; margin: 20px 0; overflow-x: auto;">
            <button onclick="filterLibrary('N5')">N5</button><button onclick="filterLibrary('N4')">N4</button><button onclick="filterLibrary('N3')">N3</button>
        </div>
        <div id="lib-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="screen-analysis" class="screen hidden" style="display: flex; align-items:center; justify-content:center;">
        <h3>🚧 아직 개발 중입니다 🚧</h3>
    </div>

    <nav class="bottom-nav hidden" id="main-nav">
        <div class="nav-item active" onclick="changeScreen('home')">🏠<br>홈</div>
        <div class="nav-item" onclick="changeScreen('skimming')">⚡<br>스키밍</div>
        <div class="nav-item" onclick="changeScreen('library')">📚<br>라이브러리</div>
        <div class="nav-item" onclick="changeScreen('analysis')">📊<br>분석</div>
        <div class="nav-item" onclick="changeScreen('screen-goal')">⚙️<br>설정</div>
    </nav>
</div>

<script>
    // --- GLOBAL STATE ---
    let state = {
        isTutorial: true,
        tutorialIdx: 0,
        targetLevel: 'N3',
        dailyGoal: 20,
        testDate: '',
        library: [],
        skimmingQueue: [],
        currentIdx: 0,
        db: [] // Loaded from JSON
    };

    // --- INITIALIZATION ---
    async function init() {
        // Load data (Assume jlpt_n3_expanded.json is in same dir)
        try {
            const response = await fetch('jlpt_n3_expanded.json');
            state.db = await response.json();
            loadFromStorage();
            if(!state.isTutorial) {
                setupApp();
            } else {
                renderTutorialCard();
            }
        } catch (e) { console.error("Data load failed", e); }
    }

    // --- SWIPE LOGIC ---
    function renderCard(containerId, word) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="swipe-overlay left"><div>✅</div><p>아는 단어, 라이브러리에 넣을게요</p></div>
            <div class="swipe-overlay right"><div>🃏</div><p>학습할 단어, 플래시 카드에서 만나요</p></div>
            <div class="c-img">🖼️</div>
            <div class="c-body">
                <div style="color: var(--accent); text-align: center;">${word.furigana}</div>
                <div class="c-kanji">${word.kanji}</div>
                <div class="c-meaning">${word.meaning}</div>
                <div style="font-size: 12px; color: var(--text-sub); text-align: center;">[${word.pos}]</div>
                <div class="c-ex">
                    <div style="font-family: 'Noto Sans JP'; font-size: 14px;">${word.example_jp}</div>
                    <div style="font-size: 12px; color: var(--text-sub); margin-top: 5px;">${word.example_kr}</div>
                </div>
            </div>
            <div style="padding: 10px 20px; display: flex; justify-content: space-between; font-size: 12px;">
                <span>${word.level}</span>
                <button onclick="speak('${word.kanji}')">🔊 TTS</button>
                <button onclick="alert('Tip: ${word.tips[0]?.meaning || "없음"}')">💡 팁</button>
            </div>
        `;
        container.appendChild(card);
        initSwipe(card);
    }

    function initSwipe(card) {
        let startX = 0;
        card.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        card.addEventListener('touchmove', e => {
            let moveX = e.touches[0].clientX - startX;
            card.style.transform = `translateX(${moveX}px) rotate(${moveX/20}deg)`;
            if(moveX < -50) card.classList.add('sw-left');
            else if(moveX > 50) card.classList.add('sw-right');
            else card.classList.remove('sw-left', 'sw-right');
        });
        card.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX - startX;
            if (Math.abs(endX) > 120) {
                handleSwipe(endX < 0 ? 'left' : 'right');
            } else {
                card.style.transform = '';
                card.classList.remove('sw-left', 'sw-right');
            }
        });
    }

    function handleSwipe(dir) {
        if(state.isTutorial) {
            state.tutorialIdx++;
            if(state.tutorialIdx >= 6) {
                state.isTutorial = false;
                changeScreen('screen-goal');
            } else {
                renderTutorialCard();
            }
        } else {
            const word = state.skimmingQueue[state.currentIdx];
            if(dir === 'left') state.library.push(word);
            state.currentIdx++;
            saveToStorage();
            if(state.currentIdx < state.dailyGoal) renderSkimCard();
            else changeScreen('home');
        }
    }

    // --- SCREEN NAVIGATION ---
    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        const nav = document.getElementById('main-nav');
        nav.classList.toggle('hidden', screenId.includes('tutorial') || screenId.includes('goal') && state.isTutorial);
    }

    // --- GOAL SETTING & STORAGE ---
    function saveGoals() {
        state.targetLevel = document.getElementById('goal-target').value;
        state.testDate = document.getElementById('goal-date').value;
        state.dailyGoal = parseInt(document.getElementById('goal-count').value);
        saveToStorage();
        setupApp();
        changeScreen('home');
    }

    function saveToStorage() {
        localStorage.setItem('jlpt_state', JSON.stringify(state));
    }

    function loadFromStorage() {
        const saved = localStorage.getItem('jlpt_state');
        if(saved) Object.assign(state, JSON.parse(saved));
    }

    // --- APP LOGIC (Home, Library) ---
    function setupApp() {
        // D-Day
        if(state.testDate) {
            const diff = Math.ceil((new Date(state.testDate) - new Date()) / (1000*60*60*24));
            document.getElementById('home-dday').innerText = `D-${diff}`;
        }
        document.getElementById('home-user-info').innerText = `${state.targetLevel} 정복까지`;
        renderCalendar();
        
        // Prepare Skimming
        state.skimmingQueue = state.db.filter(w => w.level === state.targetLevel).slice(0, state.dailyGoal);
        state.currentIdx = 0;
    }

    function renderCalendar() {
        const cal = document.getElementById('home-calendar');
        cal.innerHTML = '';
        const now = new Date();
        for(let i=0; i<3; i++) { // Render 3 months
            const m = new Date(now.getFullYear(), now.getMonth() + i, 1);
            const div = document.createElement('div');
            div.className = 'cal-month';
            div.innerHTML = `<h3>${m.getFullYear()}년 ${m.getMonth()+1}월</h3><div class="cal-grid"></div>`;
            const grid = div.querySelector('.cal-grid');
            // ... (Add date logic here for simplified calendar)
            for(let d=1; d<=30; d++) grid.innerHTML += `<div class="cal-day ${d === now.getDate() && i===0 ? 'today':''}">${d}</div>`;
            cal.appendChild(div);
        }
    }

    function renderTutorialCard() {
        document.getElementById('tut-title').innerText = `기초 실력 테스트 (${state.tutorialIdx+1}/6)`;
        renderCard('tut-zone', state.db[state.tutorialIdx]);
    }

    function renderSkimCard() {
        document.getElementById('skim-counter').innerText = `${state.currentIdx+1} / ${state.dailyGoal}`;
        renderCard('skim-zone', state.skimmingQueue[state.currentIdx]);
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        window.speechSynthesis.speak(u);
    }

    init();
</script>
</body>
</html>
