<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Swipe Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;900&family=Noto+Sans+KR:wght@400;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B; --accent: #4ECDC4; --bg: #121213;
            --card-bg: #1E1E1F; --text-main: #FFFFFF; --text-sub: #9CA3AF;
            --shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* Header */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .progress-tag { font-family: 'DM Mono'; color: var(--accent); font-size: 14px; background: rgba(78, 205, 196, 0.1); padding: 6px 12px; border-radius: 20px; }

        /* Swipe Zone */
        .swipe-zone { flex: 1; position: relative; perspective: 1000px; display: flex; align-items: center; justify-content: center; }
        .card { 
            position: absolute; width: 90%; height: 70vh; background: var(--card-bg); border-radius: 30px; 
            box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; 
            overflow: hidden; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2;
        }

        /* Card Visuals */
        .card-img { width: 100%; height: 180px; background: #2A2A2B; position: relative; }
        .level-badge { position: absolute; top: 15px; left: 15px; background: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        .card-content { padding: 25px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; }
        .furigana { color: var(--accent); font-size: 18px; font-weight: 700; letter-spacing: 2px; }
        .kanji { font-family: 'Noto Sans JP', sans-serif; font-size: 52px; font-weight: 900; margin: 5px 0; }
        .meaning { font-size: 22px; color: var(--text-sub); margin-bottom: 20px; }
        .example-area { margin-top: auto; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; text-align: left; border-left: 4px solid var(--accent); }
        .ex-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; margin-bottom: 5px; }
        .ex-kr { font-size: 13px; color: var(--text-sub); }
        ruby rt { font-size: 10px; color: var(--accent); }

        /* Overlay */
        .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; opacity: 0; backdrop-filter: blur(10px); transition: opacity 0.2s; pointer-events: none; z-index: 5; border-radius: 30px; }
        .card.left .overlay { opacity: 1; color: var(--primary); background: rgba(255, 107, 107, 0.2); }
        .card.right .overlay { opacity: 1; color: var(--accent); background: rgba(78, 205, 196, 0.2); }

        /* Report UI */
        .report-box { text-align: center; padding: 30px; color: white; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-main { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--primary); color: white; font-weight: 700; font-size: 18px; cursor: pointer; margin-top: 20px; }

        /* Footer */
        .actions { padding: 20px 30px 40px; display: flex; justify-content: center; gap: 40px; }
        .btn-circle { width: 70px; height: 70px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-x { background: #FFE5E5; color: var(--primary); }
        .btn-check { background: #E0F7F6; color: var(--accent); }
    </style>
</head>
<body>

<div id="app">
    <header class="header">
        <div style="font-size: 18px; font-weight: 700;" id="mode-title">스키밍 튜토리얼</div>
        <div class="progress-tag" id="progress">0 / 6</div>
    </header>

    <main class="swipe-zone" id="swipe-zone">
        </main>

    <div class="actions" id="action-bar">
        <button class="btn-circle btn-x" onclick="forceSwipe(-1)">✘</button>
        <button class="btn-circle btn-check" onclick="forceSwipe(1)">✔</button>
    </div>
</div>

<script>
    let db = [];
    let curIdx = 0;
    let phase = 'tutorial'; // 'tutorial' | 'report' | 'main'
    const TUTORIAL_LIMIT = 6;
    const zone = document.getElementById('swipe-zone');

    async function init() {
        try {
            const res = await fetch('jlpt_n3_expanded.json');
            db = await res.json();
            render();
        } catch (e) { console.error("Data Load Error", e); }
    }

    function applyRuby(text, alts) {
        if (!alts) return text;
        let html = text;
        alts.forEach(a => {
            html = html.replace(a.kanji, `<ruby>${a.kanji}<rt>${a.furigana}</rt></ruby>`);
        });
        return html;
    }

    function render() {
        if (phase === 'tutorial' && curIdx >= TUTORIAL_LIMIT) {
            showReport();
            return;
        }

        if (curIdx >= db.length) {
            zone.innerHTML = "<h2 style='color:white'>학습 완료!</h2>";
            return;
        }

        const data = db[curIdx];
        const total = phase === 'tutorial' ? TUTORIAL_LIMIT : db.length;
        document.getElementById('progress').innerText = `${curIdx + 1} / ${total}`;

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="overlay" id="overlay-text"></div>
            <div class="card-img"><div class="level-badge">N3</div></div>
            <div class="card-content">
                <div class="furigana">${data.furigana}</div>
                <div class="kanji">${data.kanji}</div>
                <div class="meaning">${data.meaning}</div>
                <div class="example-area">
                    <div class="ex-jp">${applyRuby(data.example_jp, data.alt_spellings)}</div>
                    <div class="ex-kr">${data.example_kr}</div>
                </div>
            </div>
        `;
        zone.innerHTML = '';
        zone.appendChild(card);
        bindEvents(card);
    }

    function showReport() {
        phase = 'report';
        document.getElementById('mode-title').innerText = "학습 리포트";
        document.getElementById('action-bar').style.visibility = 'hidden';
        
        zone.innerHTML = `
            <div class="report-box">
                <h1 style="color:var(--accent); font-size:40px; margin-bottom:10px;">6/6</h1>
                <p style="font-size:18px; line-height:1.6;">튜토리얼을 마쳤습니다!<br>N3 정복을 위한 준비가 끝났어요.</p>
                <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; margin-top:20px; text-align:left;">
                    <p>🎯 목표: N3 필수 단어 완독</p>
                    <p>📊 남은 분량: ${db.length - TUTORIAL_LIMIT}개</p>
                </div>
                <button class="btn-main" onclick="startMain()">본 코스 시작하기</button>
            </div>
        `;
    }

    function startMain() {
        phase = 'main';
        document.getElementById('mode-title').innerText = "N3 스키밍 모드";
        document.getElementById('action-bar').style.visibility = 'visible';
        render();
    }

    function bindEvents(el) {
        let startX = 0, moveX = 0, dragging = false;
        const overlay = el.querySelector('#overlay-text');

        const start = (e) => {
            dragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            el.style.transition = 'none';
        };

        const move = (e) => {
            if (!dragging) return;
            const x = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            moveX = x - startX;
            const rotation = moveX / 15;
            el.style.transform = `translateX(${moveX}px) rotate(${rotation}deg)`;

            if (moveX > 50) { el.classList.add('right'); el.classList.remove('left'); overlay.innerText = "KNOW"; }
            else if (moveX < -50) { el.classList.add('left'); el.classList.remove('right'); overlay.innerText = "LEARN"; }
            else { el.classList.remove('left', 'right'); }
        };

        const end = () => {
            if (!dragging) return;
            dragging = false;
            el.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            if (Math.abs(moveX) > 100) {
                const dir = moveX > 0 ? 1 : -1;
                el.style.transform = `translateX(${dir * 600}px) rotate(${dir * 45}deg)`;
                setTimeout(() => { curIdx++; render(); }, 300);
            } else {
                el.style.transform = 'translateX(0) rotate(0)';
                el.classList.remove('left', 'right');
            }
        };

        el.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        el.addEventListener('touchstart', start);
        el.addEventListener('touchmove', move);
        el.addEventListener('touchend', end);
    }

    function forceSwipe(dir) {
        const card = document.querySelector('.card');
        if (!card) return;
        card.style.transition = 'transform 0.5s ease-in';
        card.style.transform = `translateX(${dir * 600}px) rotate(${dir * 45}deg)`;
        setTimeout(() => { curIdx++; render(); }, 300);
    }

    window.onload = init;
</script>
</body>
</html>
